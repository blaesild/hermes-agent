[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand override here — the Dockerfile's CMD is now
# `["gateway", "run"]` by default, which the ENTRYPOINT's main-wrapper.sh
# routes to `hermes gateway run` as the supervised main program.
# The dashboard auto-starts in parallel as an s6-rc service when
# HERMES_DASHBOARD=1 (set on the service env).

# Health check the gateway's /health endpoint.
healthcheckPath = "/health"
healthcheckTimeout = 30

# Restart on crash but cap at 10 to avoid spin loops on broken state.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
